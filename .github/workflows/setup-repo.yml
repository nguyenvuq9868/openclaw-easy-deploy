name: Setup Repository Metadata

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  set-topics:
    name: Set Repository Topics
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # 仓库元数据写入需要 administration 权限
      administration: write

    steps:
      - name: Set Topics via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=openclaw' \
            -f 'names[]=ai-assistant' \
            -f 'names[]=chatbot' \
            -f 'names[]=telegram' \
            -f 'names[]=discord' \
            -f 'names[]=whatsapp' \
            -f 'names[]=bash' \
            -f 'names[]=nodejs' \
            -f 'names[]=one-click-install' \
            -f 'names[]=shell-script' \
            -f 'names[]=macos' \
            -f 'names[]=linux' \
            -f 'names[]=windows' \
            -f 'names[]=automation' \
            -f 'names[]=deployment'
          echo "✅ Topics 已设置完成"

      - name: Verify Topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 当前仓库 Topics ==="
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/topics \
            --jq '.names[]'
