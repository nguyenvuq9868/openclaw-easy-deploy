name: Setup Repository Metadata

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  set-topics:
    name: Set Repository Topics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set Topics via actions/github-script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const topics = [
              'openclaw', 'ai-assistant', 'chatbot',
              'telegram', 'discord', 'whatsapp',
              'bash', 'nodejs', 'one-click-install',
              'shell-script', 'macos', 'linux',
              'windows', 'automation', 'deployment'
            ];
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: topics
            });
            console.log('✅ Topics 已设置:', topics.join(', '));

            // 验证
            const result = await github.rest.repos.getAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            console.log('当前 Topics:', result.data.names.join(', '));
